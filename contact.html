<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Nibhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- Use same Nav as index.html -->
       <!-- Navigation -->
    <nav class="flex items-center justify-between px-10 py-4 bg-white shadow-sm sticky top-0 z-50">
        <div class="flex items-center">
            <img src="https://via.placeholder.com/150x50?text=NIBHAS+LOGO" alt="Nibhas Logo" class="h-12">
        </div>
        <div class="hidden md:flex space-x-8 font-medium text-gray-600">
            <a href="index.html" class="hover:text-blue-600">Home</a>
            <a href="#about" class="hover:text-blue-600">About</a>
            <a href="services.html" class="hover:text-blue-600">Services</a>
            <a href="contact.html" class="text-blue-600 border-b-2 border-blue-600">Contact</a>
        </div>
    </nav>

    <section class="py-16 px-6 max-w-6xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold uppercase">Connect With Us</h1>
            <p class="text-gray-500">Get in touch for placement and IT solutions inquiries.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-start">
            <!-- Form Card -->
            <div class="bg-gray-50 p-8 rounded-2xl shadow-sm border border-gray-100">
                <form class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold mb-1">Your First Name*</label>
                        <input type="text" placeholder="Enter your first name" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1">Your Email Address*</label>
                        <input type="email" placeholder="Enter your email address" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1">Your Message*</label>
                        <textarea placeholder="Type your message here" rows="4" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>
                    <button class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">Submit Your Inquiry</button>
                </form>
            </div>

            <!-- Office Image -->
            <div class="rounded-2xl overflow-hidden shadow-lg h-full">
                <img src="https://via.placeholder.com/600x500?text=OFFICE+INTERIOR" class="w-full h-full object-cover" alt="Our Office">
            </div>
        </div>
    </section>

    <!-- Location Section -->
    <section class="py-16 px-6 bg-white max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div>
                <h2 class="text-3xl font-bold mb-6 uppercase">Our Location</h2>
                <div class="space-y-4 text-gray-600">
                    <p><strong>Address:</strong><br>Marigold Shopping Complex, Room no: A2 & A3, Irinjalakuda, Thrissur, Kerala</p>
                    <p><strong>Hours:</strong><br>Mon-Fri: 9:30 AM - 4:30 PM<br>Sat: 9:30 AM - 1:00 PM</p>
                </div>
            </div>
            <div class="bg-gray-200 h-64 rounded-xl flex items-center justify-center text-gray-400">
                [Google Map Embed Placeholder]
            </div>
        </div>
    </section>

    <!-- Use same Footer as index.html -->
</body>
</html>
